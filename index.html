<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LifeOS System</title>
    <style>
        body { background: #050505; color: #00f3ff; font-family: 'Courier New', monospace; padding: 20px; }
        .card { background: rgba(0, 20, 30, 0.8); border: 1px solid #00f3ff; padding: 15px; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 0 10px #00f3ff; }
        .progress-bar { width: 100%; height: 20px; background: #222; border: 1px solid #00f3ff; }
        .progress-fill { height: 100%; background: #00f3ff; width: 20%; }
        button { background: #00f3ff; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>System Status: Online</h1>
    
    <div class="card">
        <h3>User Stats</h3>
        <p>Level: 1 | XP: 20/100</p>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div class="card">
        <h3>Daily Quests</h3>
        <ul id="taskList">
            <li><input type="checkbox"> Drink 3L Water</li>
            <li><input type="checkbox"> Coding Session (1 Hour)</li>
            <li><input type="checkbox"> Workout</li>
        </ul>
    </div>

    <div class="card">
        <h3>Hydration Tracker</h3>
        <p>Water Intake: 2 glasses</p>
        <button onclick="alert('XP Gained!')">+ Add Glass</button>
    </div>
</body>
</html>
